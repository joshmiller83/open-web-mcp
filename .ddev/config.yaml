name: open-web-mcp
type: drupal
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
xdebug_enabled: false
additional_hostnames: []
additional_fqdns: []
database:
    type: mariadb
    version: "10.11"
use_dns_when_possible: true
composer_version: "2"
web_environment:
    - DRUSH_OPTIONS_URI=https://open-web-mcp.ddev.site
    - DRUPAL_MCP_ENABLED=true
hooks:
    post-start:
        - exec: "[ -f /var/www/html/web/sites/default/settings.ddev.php ] || true"
        - exec: "mkdir -p /var/www/html/web/sites/default/files && chown -R www-data:www-data /var/www/html/web/sites/default && chmod 775 /var/www/html/web/sites/default /var/www/html/web/sites/default/files"
    post-import-db:
        - exec: drush cr
        - exec: drush updb -y
        - exec: drush cim -y
