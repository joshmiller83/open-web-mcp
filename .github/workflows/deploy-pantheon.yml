name: Deploy to Pantheon

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: open_web_build
    permissions:
      deployments: write
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Cache Composer vendor directory
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-vendor-

      - name: Composer install (no dev dependencies)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Commit build artifacts into deployment HEAD
        run: |
          # Strip gitignore exclusions for composer-managed dirs.
          # This only affects the throwaway CI checkout, not the real repo.
          sed -i '/^\/vendor\/$/d' .gitignore
          sed -i '/^\/web\/core\/$/d' .gitignore
          sed -i '/^\/web\/modules\/contrib\/$/d' .gitignore
          sed -i '/^\/web\/themes\/contrib\/$/d' .gitignore
          sed -i '/^\/web\/profiles\/contrib\/$/d' .gitignore
          sed -i '/^\/recipes$/d' .gitignore
          git config user.email "bot@getpantheon.com"
          git config user.name "Pantheon Automation"
          git add -A
          git add --force vendor/ web/core/ web/modules/contrib/ web/themes/contrib/ recipes/
          git commit -m "Add build artifacts [ci skip]"

      - name: Push to Pantheon
        uses: pantheon-systems/push-to-pantheon@0.9.0
        with:
          ssh_key: ${{ secrets.PANTHEON_SSH_KEY }}
          machine_token: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          site: ${{ secrets.PANTHEON_SITE }}
          git_commit_message: "Deploy ${{ github.sha }} from GitHub Actions"
          delete_old_environments: ${{ github.ref == 'refs/heads/main' }}
